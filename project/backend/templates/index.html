<!DOCTYPE html>
<html>
<head>
    <title>Markdown Compiler IDE</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI";
            background: #1e1e1e;
            color: white;
        }

        .toolbar {
            background: #2d2d2d;
            padding: 10px;
            display: flex;
            gap: 10px;
        }

        button {
            background: #007acc;
            border: none;
            padding: 8px 15px;
            color: white;
            cursor: pointer;
        }

        .container {
            display: flex;
            height: calc(100vh - 50px);
        }

        .editor, .output {
            width: 50%;
            padding: 10px;
        }

        .editor {
            border-right: 1px solid #444;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            font-family: monospace;
        }

        .tabs {
            display: flex;
            gap: 5px;
        }

        .tab {
            padding: 6px 12px;
            background: #333;
            cursor: pointer;
        }

        .tab.active {
            background: #007acc;
        }

        pre {
            background: #111;
            height: 85%;
            overflow: auto;
            padding: 10px;
        }

        iframe {
            width: 100%;
            height: 85%;
            border: none;
            display: none;
        }
    </style>
</head>

<body>

<div class="toolbar">
    <input type="file" id="fileInput">
    <button onclick="process()">▶ Run</button>
</div>

<div class="container">

    <div class="editor">
        <textarea id="markdownInput" placeholder="Write Markdown..."></textarea>
    </div>

    <div class="output">

        <div class="tabs">
            <div class="tab active" onclick="setView('html', this)">HTML</div>
            <div class="tab" onclick="setView('typst', this)">Typst</div>
            <div class="tab" onclick="setView('tokens', this)">Tokens</div>
            <div class="tab" onclick="setView('ast', this)">AST</div>
            <div class="tab" onclick="setView('json', this)">JSON</div>
            <div class="tab" onclick="setView('preview', this)">Preview</div>
        </div>

        <pre id="output"></pre>
        <iframe id="preview"></iframe>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
